name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  test:
    name: Pytest
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install CPU-only PyTorch
        run: |
          pip install torch torchvision \
            --index-url https://download.pytorch.org/whl/cpu

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest tests/ -v

  lint:
    name: Flake8
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install flake8
        run: pip install flake8

      - name: Lint src/ and app/
        run: >-
          flake8 src/ app/
          --max-line-length 100
          --extend-ignore=E402,W503,W504
          --per-file-ignores=app/streamlit_app.py:E501,E221,E203,E231,E272,E122,E127,E128
